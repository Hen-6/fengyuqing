<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0.07" preserveAspectRatio="xMidYMid slice">
  <defs>
