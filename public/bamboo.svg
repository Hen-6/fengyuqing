<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 600" width="200" height="600" preserveAspectRatio="xMaxYMid meet">
  <defs>
    <linearGradient id="bambooGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2c2416" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#2c2416" stop-opacity="0.3"/>
